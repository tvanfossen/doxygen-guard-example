# Requirements
# Software-level and product-level requirements for the example IoT project.
# doxygen-guard uses `id` as the requirement key and `module` for participant resolution.

- id: REQ-0010
  name: Temperature Sensing
  module: Sensor Driver
  description: >
    Read raw temperature values from the ADC hardware interface
    and post sensor data events for downstream processing.
  acceptance_criteria: >
    Sensor_ReadTemperature returns valid ADC reading.
    EVENT_SENSOR_DATA_READY posted with raw value.
  version: v1.0.0

- id: REQ-0011
  name: Humidity Sensing
  module: Sensor Driver
  description: >
    Read raw humidity values from the ADC hardware interface
    and post sensor data events for downstream processing.
  acceptance_criteria: >
    Sensor_ReadHumidity returns valid ADC reading.
    EVENT_SENSOR_DATA_READY posted with raw value.
  version: v1.0.0

- id: REQ-0012
  name: Sensor Calibration
  module: Sensor Driver
  description: >
    Apply factory calibration offsets to sensor readings
    using data from the controller's calibration store.
  acceptance_criteria: >
    Sensor_Calibrate retrieves offsets via Controller_GetCalibration.
    Offsets applied to subsequent readings.
  version: v1.0.0

- id: REQ-0020
  name: Remote Status Reporting
  module: Comm Manager
  description: >
    Publish device status to cloud via MQTT transport.
    Handle shadow state synchronization events.
  acceptance_criteria: >
    Comm_SendStatus publishes to MQTT topic.
    Shadow connectivity events update local state.
  version: v1.0.0

- id: REQ-0021
  name: Remote Command Handling
  module: Comm Manager
  description: >
    Receive and dispatch remote commands from cloud.
    Parse command payload and post control action events.
  acceptance_criteria: >
    Comm_OnRemoteCommand parses command and posts EVENT_CONTROL_ACTION.
  version: v1.0.0

- id: REQ-0030
  name: Control Loop Processing
  module: Controller
  description: >
    Process sensor data against thresholds and dispatch
    control actions. Report status via comm manager.
  acceptance_criteria: >
    Controller_OnSensorData evaluates thresholds.
    Controller_ReportStatus sends status via Comm_SendStatus.
  version: v1.0.0

- id: REQ-0040
  name: OTA Firmware Update
  module: OTA Manager
  description: >
    Orchestrate firmware update lifecycle: receive cloud
    notification, coordinate download, write to flash,
    verify integrity, report result.
  acceptance_criteria: >
    OTA state machine progresses through download, write, verify.
    CRC verification passes before reporting success.
  version: v1.0.0

- id: REQ-0041
  name: OTA Download Coordination
  module: Comm Manager
  description: >
    Stream firmware chunks from HTTP server and post
    chunk-received events for OTA manager processing.
  acceptance_criteria: >
    Comm_DownloadFirmware streams chunks and posts completion event.
  version: v1.0.0

- id: REQ-0050
  name: Event Bus Infrastructure
  module: Event Bus
  description: >
    Provide bitmask-based event registration and dispatch
    for decoupled inter-module communication.
  acceptance_criteria: >
    Event_register accepts bitmask and handler.
    Event_post dispatches to all matching handlers.
  version: v1.0.0

- id: REQ-0060
  name: Device Provisioning
  module: Provisioning Manager
  description: >
    Orchestrate device provisioning: scan networks,
    join, and install certificates.
  acceptance_criteria: >
    Device progresses through scan/join/cert states.
    Provisioning completes or retries on failure.
  version: v1.0.0

- id: REQ-0061
  name: WiFi Network Discovery
  module: WiFi Scanner
  description: >
    Scan for available networks and attempt association.
  acceptance_criteria: >
    Scan returns network list.
    Join produces success or failure result.
  version: v1.0.0

- id: REQ-0062
  name: Certificate Provisioning
  module: Cert Manager
  description: >
    Fetch and install device certificate from provisioning server.
  acceptance_criteria: >
    Certificate downloaded via HTTPS and written to flash.
  version: v1.0.0

- id: REQ-PROD-001
  name: Device Environmental Monitoring
  module: Product
  description: >
    The system shall continuously monitor temperature and humidity
    and report to cloud.
  acceptance_criteria: >
    Sensor readings aggregated and transmitted.
    Cloud receives telemetry within reporting interval.
  version: v1.0.0

- id: REQ-PROD-002
  name: Remote Device Control
  module: Product
  description: >
    The system shall accept remote commands from cloud
    and execute control actions.
  acceptance_criteria: >
    Cloud command received within 30s.
    Control action executed and status reported back.
  version: v1.0.0

- id: REQ-PROD-003
  name: Over-the-Air Firmware Update
  module: Product
  description: >
    The system shall support remote firmware updates
    with integrity verification.
  acceptance_criteria: >
    OTA completes download/flash/verify cycle.
    Device reports success or failure to cloud.
  version: v1.0.0
