output_dir: docs/generated/

validate:
  tags:
    req:
      pattern: "^REQ-[\\w-]+$"

trace:
  format: plantuml
  participant_field: "module"
  external:
    - Cloud:
        receives_prefix: ["EVENT_CLOUD_"]
    - Hardware:
        receives_prefix: ["EVENT_HW_"]
    - WiFi Stack:
        receives_prefix: ["EVENT_WIFI_", "EVENT_MQTT_"]
    - User Action:
        receives_prefix: ["EVENT_FACTORY_"]
  options:
    autonumber: true

impact:
  requirements:
    file: requirements.yaml
    id_column: "id"
    name_column: "name"
    format: yaml
