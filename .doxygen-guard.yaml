validate:
  tags:
    req:
      pattern: "^REQ-\\w+$"
    emits:
      require_prefix: ["EVENT:"]
    handles:
      require_prefix: ["EVENT:"]
    ext:
      require_contains: "::"

trace:
  format: plantuml
  output_dir: docs/sequences/
  participant_field: "Subsystem"
  options:
    autonumber: true

impact:
  requirements:
    file: requirements.csv
    id_column: "Req ID"
    name_column: "Name"
    format: csv
  output:
    format: markdown
