output_dir: docs/generated/

validate:
  tags:
    req:
      pattern: "^REQ-[\\w-]+$"
    emits:
      require_prefix: ["EVENT:"]
    handles:
      require_prefix: ["EVENT:"]
    ext:
      require_contains: "::"

trace:
  format: plantuml
  participant_field: "module"
  external:
    - Cloud:
        receives_prefix: ["EVENT:CLOUD_"]
    - Hardware:
        receives_prefix: ["EVENT:HW_"]
    - WiFi Stack:
        receives_prefix: ["EVENT:WIFI_", "EVENT:MQTT_"]
    - User Action:
        receives_prefix: ["EVENT:FACTORY_"]
  options:
    autonumber: true

impact:
  requirements:
    file: requirements.yaml
    id_column: "id"
    name_column: "name"
    format: yaml
