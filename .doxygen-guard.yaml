validate:
  tags:
    req:
      pattern: "^REQ-\\w+$"
    emits:
      require_prefix: ["EVENT:"]
    handles:
      require_prefix: ["EVENT:"]
    ext:
      require_contains: "::"

trace:
  format: plantuml
  output_dir: docs/sequences/
  participants:
    - id: sensor
      label: "Sensor Driver"
      match: "sensor/"
    - id: ctrl
      label: "Controller"
      match: "controller/"
    - id: comm
      label: "Comm Manager"
      match: "comm/"
    - id: analytics
      label: "Analytics"
      match: "analytics/"
  options:
    autonumber: true

impact:
  requirements:
    file: requirements.csv
    id_column: "Req ID"
    name_column: "Name"
    format: csv
  output:
    format: markdown
